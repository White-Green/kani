name: Kani CI
on:
  pull_request:
  merge_group:
  push:
    # Not just any push, as that includes tags.
    # We don't want to re-trigger this workflow when tagging an existing commit.
    branches:
      - '**'

env:
  RUST_BACKTRACE: 1

jobs:
  regression:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    env:
      CBMC_BUILD_FROM_SOURCE: "0"
      KANI_WINDOWS_COMPILETEST_WALLCLOCK_TIMEOUT: "5400"
      KANI_WINDOWS_COMPILETEST_FILTER: "option.rs"
      KANI_WINDOWS_COMPILETEST_VERBOSE: "1"
      KANI_REGRESSION_SOLVER: "z3"
      KANI_REGRESSION_OBJECT_BITS: "20"
    strategy:
      fail-fast: false
      matrix:
        # TEMPORARY: narrow matrix for faster Windows bring-up loops.
        os: [windows-2025]
    steps:
      - name: Checkout Kani
        uses: actions/checkout@v6

      - name: Setup Kani Dependencies
        uses: ./.github/actions/setup
        with:
          os: ${{ matrix.os }}

      - name: Execute Kani regression
        run: ./scripts/kani-regression.sh
        shell: bash

  benchcomp-tests:
    # TEMPORARY: skip on push while focusing on Windows regression bring-up.
    if: ${{ github.event_name != 'push' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout Kani
        uses: actions/checkout@v6

      - name: Install benchcomp dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pushd tools/benchcomp && pip3 install -r requirements.txt
        shell: bash

      - name: Setup Kani Dependencies
        uses: ./.github/actions/setup
        with:
          os: ubuntu-24.04

      - name: Build Kani using release mode
        run: cargo build-dev -- --release
        shell: bash

      - name: Run benchcomp unit and regression tests
        run: pushd tools/benchcomp && PATH=$(realpath ../../scripts):$PATH test/run
        shell: bash

  perf:
    if: ${{ github.event_name != 'push' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout Kani
        uses: actions/checkout@v6

      - name: Setup Kani Dependencies
        uses: ./.github/actions/setup
        with:
          os: ubuntu-24.04

      - name: Execute Kani performance tests
        run: ./scripts/kani-perf.sh
        shell: bash
        env:
          RUST_TEST_THREADS: 1

  llbc-regression:
    # TEMPORARY: skip on push while focusing on Windows regression bring-up.
    if: ${{ github.event_name != 'push' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout Kani
        uses: actions/checkout@v6

      - name: Setup Kani Dependencies
        uses: ./.github/actions/setup
        with:
          os: ubuntu-24.04

      # Patch Charon so that it compiles. This is temporary until we're able to
      # upgrade the pinned commit which requires fixing
      # https://github.com/AeneasVerif/charon/issues/806 and updating the
      # mir-to-ullbc code
      - name: Patch Charon
        run: cd charon && git apply ../scripts/charon-patch.diff
        shell: bash

      - name: Build Kani with Charon
        run: cargo build-dev -- --features cprover --features llbc
        shell: bash

      - name: Run tests
        run: ./scripts/kani-llbc-regression.sh
        shell: bash

  documentation:
    # TEMPORARY: skip on push while focusing on Windows regression bring-up.
    if: ${{ github.event_name != 'push' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout Kani
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install book dependencies
        run: ./scripts/setup/ubuntu/install_doc_deps.sh
        shell: bash

      # On one OS only, build the documentation, too.
      - name: Build Documentation
        run: ./scripts/build-docs.sh
        shell: bash

      # When we're pushed to main branch, only then actually publish the docs.
      - name: Publish Documentation
        if: ${{ github.event_name == 'push' && startsWith('refs/heads/main', github.ref) }}
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs/book/
          single-commit: true
